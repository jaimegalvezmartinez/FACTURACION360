spring.application.name=facturacion360

# ==========================================================================
#  Base de datos H2 en memoria (solo para desarrollo/clase)
# ==========================================================================
spring.datasource.url=jdbc:h2:mem:facturacion360
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea el esquema al arrancar y lo borra al parar.
# 'create-drop' es cómodo en clase; en producción sería 'validate' + migraciones.
spring.jpa.hibernate.ddl-auto=create-drop

# Muestra el SQL por consola: útil para ver la consulta paginada (LIMIT/OFFSET).
spring.jpa.show-sql=true

# ==========================================================================
#  Consola web de H2 (opcional)
# ==========================================================================
# Permite inspeccionar la BD en http://localhost:8080/h2-console
# OJO Spring Boot 4: la autoconfiguración de la consola se movió a un módulo
# aparte. Si /h2-console da 404, añade en el pom la dependencia
# spring-boot-h2-console (ver pom-dependencias-a-anadir.xml).
spring.h2.console.enabled=true
